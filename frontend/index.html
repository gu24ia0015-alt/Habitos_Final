<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitFlow — Habit Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">🔥</span>
      <span class="brand-name">HabitFlow</span>
    </div>
    <div class="nav-actions">
      <button id="theme-toggle" class="btn-icon" title="Toggle theme">🌙</button>
    </div>
  </nav>
<!-- MAIN LAYOUT -->
  <main class="container">

    <!-- DASHBOARD HEADER -->
    <section class="dashboard-header">
      <div>
        <h1>Mi Dashboard</h1>
        <p id="today-date" class="subtitle"></p>
      </div>
      <button id="open-modal-btn" class="btn btn-primary">+ Nuevo Hábito</button>
    </section>

    <!-- STATS CARDS -->
    <section class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">📋</span>
        <div>
          <p class="stat-label">Total Hábitos</p>
          <p class="stat-value" id="total-habits">0</p>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <div>
          <p class="stat-label">Completados Hoy</p>
          <p class="stat-value" id="completed-today">0</p>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🔥</span>
        <div>
          <p class="stat-label">Mejor Racha</p>
          <p class="stat-value" id="best-streak">0</p>
        </div>
      </div>
    </section>

    <!-- HABITS LIST + CALENDAR -->
    <div class="grid-2col">

      <!-- HABITS LIST -->
      <section class="card">
        <h2 class="section-title">Mis Hábitos</h2>
        <div id="habits-list" class="habits-list">
          <p class="empty-msg">No tienes hábitos aún. ¡Crea uno! 🚀</p>
        </div>
      </section>

      <!-- CALENDAR -->
      <section class="card">
        <h2 class="section-title">Calendario</h2>
        <div class="calendar-controls">
          <button id="prev-month" class="btn-icon">‹</button>
          <span id="calendar-title" class="calendar-month"></span>
          <button id="next-month" class="btn-icon">›</button>
        </div>
        <div id="calendar" class="calendar"></div>
        <div class="calendar-legend">
          <span class="legend-dot completed-dot"></span> Completado
          <span class="legend-dot"></span> Pendiente
        </div>
      </section>

    </div>
    <!-- PROGRESS CHARTS -->
    <section class="card">
      <h2 class="section-title">Progreso — Últimos 7 días</h2>
      <div id="charts-container" class="charts-container">
        <p class="empty-msg">Agrega hábitos para ver gráficas 📊</p>
      </div>
    </section>

  </main>

  <!-- MODAL: Crear Hábito -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3>Nuevo Hábito</h3>
        <button id="close-modal-btn" class="btn-icon">✕</button>
      </div>
      <div class="modal-body">
        <label>Nombre *</label>
        <input type="text" id="habit-name" placeholder="Ej: Meditar 10 minutos" />

        <label>Descripción</label>
        <input type="text" id="habit-desc" placeholder="Opcional..." />

        <label>Color</label>
        <div class="color-picker">
          <span class="color-opt selected" data-color="#6366f1" style="background:#6366f1"></span>
          <span class="color-opt" data-color="#ec4899" style="background:#ec4899"></span>
          <span class="color-opt" data-color="#10b981" style="background:#10b981"></span>
          <span class="color-opt" data-color="#f59e0b" style="background:#f59e0b"></span>
          <span class="color-opt" data-color="#ef4444" style="background:#ef4444"></span>
          <span class="color-opt" data-color="#3b82f6" style="background:#3b82f6"></span>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancel-btn" class="btn btn-secondary">Cancelar</button>
        <button id="save-habit-btn" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>
  
<!-- SCRIPTS -->
  <script src="js/app.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/charts.js"></script>

</body>
</html>
