<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitFlow — Habit Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">🔥</span>
      <span class="brand-name">HabitFlow</span>
    </div>
    <div class="nav-actions">
      <button id="theme-toggle" class="btn-icon" title="Toggle theme">🌙</button>
    </div>
  </nav>
<!-- MAIN LAYOUT -->
  <main class="container">

    <!-- DASHBOARD HEADER -->
    <section class="dashboard-header">
      <div>
        <h1>Mi Dashboard</h1>
        <p id="today-date" class="subtitle"></p>
      </div>
      <button id="open-modal-btn" class="btn btn-primary">+ Nuevo Hábito</button>
    </section>

    <!-- STATS CARDS -->
    <section class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">📋</span>
        <div>
          <p class="stat-label">Total Hábitos</p>
          <p class="stat-value" id="total-habits">0</p>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <div>
          <p class="stat-label">Completados Hoy</p>
          <p class="stat-value" id="completed-today">0</p>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🔥</span>
        <div>
          <p class="stat-label">Mejor Racha</p>
          <p class="stat-value" id="best-streak">0</p>
        </div>
      </div>
    </section>

</body>
</html>
